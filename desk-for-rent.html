        </div>

        <div class="form-group">
          <label for="fecha" data-i18n="form.fecha">Fecha</label>
          <input type="date" id="fecha" name="fecha" required>
        </div>

        <div class="form-group">
          <label for="rrss_perfil" data-i18n="form.rrss">¿Cuál es tu perfil de redes sociales?</label>
          <input type="text" id="rrss_perfil" name="rrss_perfil" data-i18n-placeholder="form.rrss.placeholder">
        </div>

        <div class="form-group">
          <label for="mensaje" data-i18n="form.mensaje">Mensaje (opcional)</label>
          <textarea id="mensaje" name="mensaje" rows="3" data-i18n-placeholder="form.mensaje.placeholder"></textarea>
        </div>

        <button type="submit" class="btn" id="submit-btn" data-i18n="form.submit">Enviar</button>
        <p class="form-success" id="form-success" data-i18n="form.success">Mensaje enviado. Te contactaremos pronto.</p>
        <p class="form-error" id="form-error" data-i18n="form.error">Error al enviar. Inténtalo de nuevo.</p>
      </form>
    </div>
  </section>

  <script>
    (function () {
      var translations = {
        es: {
          'lang.aria': 'Idioma',
          'equipos.label': 'Equipo disponible',
          'equipos.alt': 'Pioneer CDJ-3000 y Allen & Heath Xone:96',
          'equipos.cdj': '2× Pioneer CDJ-3000',
          'equipos.xone': '1× Allen & Heath Xone:96',
          'cta.presupuesto': 'Solicitar presupuesto',
          'form.nombre': 'Nombre',
          'form.nombre.placeholder': 'Tu nombre completo',
          'form.telefono': 'Teléfono',
          'form.telefono.placeholder': '+34 600 000 000',
          'form.email': 'Email',
          'form.email.placeholder': 'tu@email.com',
          'form.equipo': 'Equipo',
          'form.evento': 'Tipo de evento',
          'form.fecha': 'Fecha',
          'form.rrss': '¿Cuál es tu perfil de redes sociales?',
          'form.rrss.placeholder': '@instagram',
          'form.mensaje': 'Mensaje (opcional)',
          'form.mensaje.placeholder': 'Cuéntanos más sobre tu evento…',
          'form.submit': 'Enviar',
          'form.success': 'Mensaje enviado. Te contactaremos pronto.',
          'form.error': 'Error al enviar. Inténtalo de nuevo.',
          'select.placeholder': 'Selecciona una opción',
          'equipo.setup': 'Setup completo',
          'equipo.cdj2': 'Solo CDJ-3000 x2',
          'equipo.cdj1': 'Solo 1× CDJ-3000',
          'equipo.xone': 'Solo Xone:96',
          'evento.privada': 'Fiesta privada',
          'evento.corporativo': 'Corporativo',
          'evento.club': 'Club / Festival',
          'evento.estudio': 'Estudio'
        },
        en: {
          'lang.aria': 'Language',
          'equipos.label': 'Available Gear',
          'equipos.alt': 'Pioneer CDJ-3000 and Allen & Heath Xone:96',
          'equipos.cdj': '2× Pioneer CDJ-3000',
          'equipos.xone': '1× Allen & Heath Xone:96',
          'cta.presupuesto': 'Get a Quote',
          'form.nombre': 'Name',
          'form.nombre.placeholder': 'Your full name',
          'form.telefono': 'Phone',
          'form.telefono.placeholder': '+34 600 000 000',
          'form.email': 'Email',
          'form.email.placeholder': 'you@email.com',
          'form.equipo': 'Equipment',
          'form.evento': 'Event type',
          'form.fecha': 'Date',
          'form.rrss': 'What is your main social media profile?',
          'form.rrss.placeholder': '@instagram',
          'form.mensaje': 'Message (optional)',
          'form.mensaje.placeholder': 'Tell us more about your event…',
          'form.submit': 'Send',
          'form.success': 'Message sent. We\'ll contact you soon.',
          'form.error': 'Error sending. Please try again.',
          'select.placeholder': 'Select an option',
          'equipo.setup': 'Full setup',
          'equipo.cdj2': 'CDJ-3000 x2 only',
          'equipo.cdj1': '1× CDJ-3000 only',
          'equipo.xone': 'Xone:96 only',
          'evento.privada': 'Private party',
          'evento.corporativo': 'Corporate',
          'evento.club': 'Club / Festival',
          'evento.estudio': 'Studio session'
        }
      };

      var currentLang = localStorage.getItem('lang') || 'es';

      function applyLanguage(lang) {
        currentLang = lang;
        localStorage.setItem('lang', lang);
        document.documentElement.lang = lang;

        var t = translations[lang];

        document.getElementById('lang-toggle').setAttribute('aria-label', t['lang.aria']);

        document.querySelectorAll('[data-i18n]').forEach(function (el) {
          el.textContent = t[el.getAttribute('data-i18n')];
        });

        document.querySelectorAll('[data-i18n-placeholder]').forEach(function (el) {
          el.placeholder = t[el.getAttribute('data-i18n-placeholder')];
        });

        document.querySelectorAll('[data-i18n-alt]').forEach(function (el) {
          el.alt = t[el.getAttribute('data-i18n-alt')];
        });

        document.querySelectorAll('option[data-i18n]').forEach(function (opt) {
          var key = opt.getAttribute('data-i18n');
          var text = t[key];
          opt.textContent = text;
          if (opt.value !== '') {
            opt.value = text;
          }
        });

        document.querySelectorAll('.lang-opt').forEach(function (el) {
          el.classList.toggle('active', el.getAttribute('data-lang') === lang);
        });
      }

      document.querySelectorAll('.lang-opt').forEach(function (el) {
        el.addEventListener('click', function () {
          var lang = el.getAttribute('data-lang');
          if (lang !== currentLang) {
            applyLanguage(lang);
          }
        });
      });

      applyLanguage(currentLang);

      var btnPresupuesto = document.getElementById('btn-presupuesto');
      var formPanel = document.getElementById('form-panel');
      var contactForm = document.getElementById('contact-form');
      var formSuccess = document.getElementById('form-success');
      var formError = document.getElementById('form-error');
      var submitBtn = document.getElementById('submit-btn');

      btnPresupuesto.addEventListener('click', function () {
        var open = formPanel.classList.toggle('open');
        btnPresupuesto.setAttribute('aria-expanded', String(open));
        formPanel.setAttribute('aria-hidden', String(!open));
        if (open) {
          formPanel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
      });

      contactForm.addEventListener('submit', function (e) {
        e.preventDefault();
        formSuccess.classList.remove('show');
        formError.classList.remove('show');
        submitBtn.disabled = true;

        fetch(contactForm.action, {
          method: 'POST',
          body: new FormData(contactForm),
          headers: { Accept: 'application/json' }
        }).then(function (response) {
          if (response.ok) {
            contactForm.reset();
            formSuccess.classList.add('show');
          } else {
            formError.classList.add('show');
            submitBtn.disabled = false;
          }
        }).catch(function () {
          formError.classList.add('show');
          submitBtn.disabled = false;
        });
      });
    })();
  </script>

</body>
</html>
